name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch to save CI time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use 'true' to enable Turborepo logs without forcing remote cache.
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Validate (lint + typecheck + boundary + manifests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Dependency boundaries
        run: pnpm validate:deps

      - name: Manifest validation
        run: pnpm validate:manifests

      - name: Event catalog validation
        run: pnpm validate:events

      - name: RLS checker
        run: pnpm validate:rls

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
